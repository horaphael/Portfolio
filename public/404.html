<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: send 404 back to index.html
      const base = '/Portfolio';
      const path = window.location.pathname.replace(base, '') || '/';
      window.location.replace(base + '/#' + path);
    </script>
  </head>
  <body></body>
</html>
